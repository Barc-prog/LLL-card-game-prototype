function BoardScreen({ onNext, onBack }) {
  const cellSize = 18;
  const gap = 3.5;
  const step = cellSize + gap;
  const margin = 8;
  const topCount = 16;
  const sideCount = 14;
  const boardW = margin * 2 + topCount * step;
  const boardH = margin * 2 + (sideCount + 2) * step;

  const cells = [];
  // Top row: 1-16 (left to right)
  for (let i = 0; i < topCount; i++) {
    cells.push({ n: i + 1, x: margin + i * step, y: margin });
  }
  // Right col: 17-30 (top to bottom)
  for (let i = 0; i < sideCount; i++) {
    cells.push({ n: topCount + i + 1, x: margin + (topCount - 1) * step, y: margin + (i + 1) * step });
  }
  // Bottom row: 31-46 (right to left)
  for (let i = 0; i < topCount; i++) {
    cells.push({ n: topCount + sideCount + i + 1, x: margin + (topCount - 1 - i) * step, y: margin + (sideCount + 1) * step });
  }
  // Left col: 47-60 (bottom to top)
  for (let i = 0; i < sideCount; i++) {
    cells.push({ n: topCount * 2 + sideCount + i + 1, x: margin, y: margin + (sideCount - i) * step });
  }

  const milestones = [15, 25, 40, 60];

  const shortlistBlocks = [
    "Tsa Tshepo — Faith", "Ko Skolong — School", "eBioscope — Cinema",
    "Tsa Mmino — Music", "Tsa Baholo — Elders", "eBumnandini — Entertainment",
    "Tsa Mzali — Growing up", "eDladleni — Home", "eStratweni — Street life",
    "eRenkini — Taxi rank", "Tsa Dipuo — Language", "eGroundini — Sports",
    "eKitchini — Food", "eMakhaya — Rural", "Dot Kasi Dot Com — Internet",
    "Tsa Polotiki — Politics", "eSalooni — Hair & beauty"
  ];
  const futureBlocks = [
    "On African Time — Continental", "eArts Centre — Arts", "Biblioteek — Literature",
    "Tsa di Vava — Universities", "ezeSdwadlo — Fashion", "Ko Spaza — Tuckshop",
    "kaNyamazane — Animals", "Tsa Maphelo — Health", "Tsa Babereki — Work",
    "ezaMashishini — Business", "eNkantolo — Law"
  ];

  const innerX = margin + step + 4;
  const innerY = margin + step + 4;
  const innerW = (topCount - 2) * step - 8;
  const innerH = sideCount * step - 8;

  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", padding:"1.5rem 1rem", background:"#111", color:"#f0ebe3" }}>
      <div style={{ maxWidth:440, width:"100%" }}>
        <div style={{ fontSize:11, letterSpacing:4, textTransform:"uppercase", color:"#C00000", marginBottom:16, fontWeight:600 }}>The play set</div>
        <h2 style={{ fontSize:22, fontWeight:700, marginBottom:6, fontFamily:"Georgia, serif" }}>Score board</h2>
        <p style={{ fontSize:13, color:"#888", marginBottom:6, lineHeight:1.6 }}>A simple board with numbered squares. Earn points, move your token forward. First to the agreed target wins.</p>
        <div style={{ display:"flex", gap:12, marginBottom:16, flexWrap:"wrap" }}>
          {milestones.map(m => (
            <div key={m} style={{ display:"flex", alignItems:"center", gap:4 }}>
              <div style={{ width:14, height:14, borderRadius:3, background: m===60?"#C00000":"#7F6000", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:7, color:"#fff", fontWeight:700 }}>★</span>
              </div>
              <span style={{ fontSize:11, color:"#999" }}>{m} = {m===15?"Quick":m===25?"Standard":m===40?"Full":"Marathon"}</span>
            </div>
          ))}
        </div>

        <div style={{ background:"#1a1a1a", borderRadius:12, padding:"12px", border:"1px solid #282828", marginBottom:16, overflowX:"auto" }}>
          <svg viewBox={`0 0 ${boardW} ${boardH}`} style={{ width:"100%", height:"auto" }}>
            {/* Board squares */}
            {cells.map((c) => {
              const isMilestone = milestones.includes(c.n);
              const isFinish = c.n === 60;
              const isStart = c.n === 1;
              return (
                <g key={c.n}>
                  <rect
                    x={c.x} y={c.y} width={cellSize} height={cellSize} rx={isStart || isFinish ? 4 : 2}
                    fill={isFinish ? "#C00000" : isMilestone ? "#7F6000" : isStart ? "#375623" : "#2a2a2a"}
                    stroke={isMilestone || isFinish || isStart ? "#fff" : "#3a3a3a"}
                    strokeWidth={isMilestone || isFinish || isStart ? 0.8 : 0.3}
                  />
                  <text
                    x={c.x + cellSize / 2} y={c.y + cellSize / 2 + 1}
                    fill={isMilestone || isFinish || isStart ? "#fff" : "#666"}
                    fontSize={c.n >= 10 ? 5.5 : 6.5} fontWeight={isMilestone || isFinish ? 700 : 400}
                    textAnchor="middle" dominantBaseline="middle"
                  >{c.n}</text>
                  {isMilestone && !isFinish && (
                    <text x={c.x + cellSize / 2} y={c.y - 2} fill="#7F6000" fontSize={4} textAnchor="middle" fontWeight={600}>★</text>
                  )}
                  {isFinish && (
                    <text x={c.x + cellSize / 2} y={c.y - 2} fill="#C00000" fontSize={4} textAnchor="middle" fontWeight={700}>WIN</text>
                  )}
                  {isStart && (
                    <text x={c.x + cellSize / 2} y={c.y - 2} fill="#375623" fontSize={3.5} textAnchor="middle" fontWeight={600}>START</text>
                  )}
                </g>
              );
            })}

            {/* Inner area - content categories */}
            <rect x={innerX} y={innerY} width={innerW} height={innerH} rx={6} fill="#161616" stroke="#222" strokeWidth={0.5} />

            {/* LLL title in center */}
            <text x={innerX + innerW / 2} y={innerY + 14} fill="#C00000" fontSize={10} fontWeight={800} textAnchor="middle" letterSpacing={2}>LLL</text>
            <text x={innerX + innerW / 2} y={innerY + 22} fill="#555" fontSize={4} textAnchor="middle">CONTENT UNIVERSE</text>

            {/* Shortlisted blocks */}
            {shortlistBlocks.map((b, i) => {
              const cols = 2;
              const col = i % cols;
              const row = Math.floor(i / cols);
              const tx = innerX + 8 + col * (innerW / 2 - 4);
              const ty = innerY + 32 + row * 12;
              const name = b.split(" — ")[0];
              const en = b.split(" — ")[1];
              return (
                <g key={i}>
                  <text x={tx} y={ty} fill="#ccc" fontSize={4.8} fontWeight={600}>{name}</text>
                  <text x={tx} y={ty + 5.5} fill="#666" fontSize={3.8}>{en}</text>
                </g>
              );
            })}

          </svg>
        </div>

        <div style={{ background:"#1a1a1a", borderRadius:10, padding:"12px 14px", marginBottom:20, border:"1px solid #282828" }}>
          <p style={{ fontSize:12, color:"#C09050", margin:0, lineHeight:1.6, fontWeight:500 }}>The board comes with <span style={{ color:"#f0ebe3", fontWeight:600 }}>2 tokens</span> (one per team) and fits inside the game box. Content categories are displayed for cultural flavour — they don't affect gameplay.</p>
        </div>

        <div style={{ display:"flex", gap:10 }}>
          <button onClick={onBack} style={{ flex:1, background:"transparent", color:"#666", border:"1px solid #282828", borderRadius:8, padding:"12px", fontSize:13, cursor:"pointer" }}>Back</button>
          <button onClick={onNext} style={{ flex:2, background:"#375623", color:"#fff", border:"none", borderRadius:8, padding:"12px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Browse the cards →</button>
        </div>
      </div>
    </div>
  );
}

function CardComponent({ card, showExplainer }) {
  const [rotated, setRotated] = useState(false);
  const [clueIdx, setClueIdx] = useState(0);
  const [showAnswer, setShowAnswer] = useState(false);
  const typeColor = TYPE_COLORS[card.type] || "#666";
  const meta = TYPE_META[card.type];

  useEffect(() => { setRotated(false); setClueIdx(0); setShowAnswer(false); }, [card.id]);

  const isWho = card.type === "Who's Who?";
  const isOrder = card.type === "Order, Comrade!";
  const isHtH = card.type === "Head-to-Head";
  const isBnS = card.type === "Bring and Share";

  return (
    <div>
      {showExplainer && (
        <div style={{ background:"#1a1a1a", border:`1px solid ${typeColor}44`, borderRadius:10, padding:"12px 16px", marginBottom:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
            <span style={{ fontSize:10, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:typeColor }}>{card.type}</span>
            {meta.mode === "Host" && <span style={{ fontSize:9, background:"#D2691E33", color:"#D2691E", padding:"2px 8px", borderRadius:10, fontWeight:600 }}>Needs GM/Host</span>}
          </div>
          <p style={{ fontSize:12, color:"#999", margin:0, lineHeight:1.6 }}>{meta.desc}</p>
        </div>
      )}

      <div style={{
        transition:"transform 0.4s ease",
        transform: rotated ? "rotate(180deg)" : "rotate(0deg)",
        background:"#fff", borderRadius:12, overflow:"hidden", border:"1px solid #ddd",
        minHeight:isWho ? 440 : isHtH ? 420 : 380,
        display:"flex", flexDirection:"column",
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:10, fontWeight:700, letterSpacing:1, textTransform:"uppercase", color:"#fff", background:typeColor, padding:"3px 10px", borderRadius:20 }}>
              {card.type}{meta.subtitle ? ` — ${meta.subtitle}` : ""}
            </span>
            {meta.mode === "Host" && <span style={{ fontSize:9, color:"#D2691E", fontWeight:600 }}>GM</span>}
          </div>
          <span style={{ fontSize:11, fontWeight:600, color:"#999" }}>{card.pts}</span>
        </div>

        <div style={{ padding:"6px 14px", background:"#f5f5f5", borderTop:"1px solid #eee", borderBottom:"1px solid #eee", display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:11, fontWeight:700, color:typeColor }}>{card.block}</span>
          <span style={{ fontSize:11, color:"#ccc" }}>— {card.blockEn}</span>
          {card.isNew && <span style={{ fontSize:8, background:"#C00000", color:"#fff", padding:"2px 7px", borderRadius:10, fontWeight:700, letterSpacing:1, textTransform:"uppercase", marginLeft:"auto" }}>New block</span>}
        </div>

        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding: isWho ? "16px 18px" : "20px 18px", gap:12 }}>
          {isWho ? (
            <>
              <div style={{ width:"100%", display:"flex", flexDirection:"column", gap:8 }}>
                {card.clues.map((c,i) => (
                  <div key={i} style={{
                    padding:"10px 14px", borderRadius:8,
                    background: i <= clueIdx ? "#fafafa" : "#f0f0f0",
                    border: i <= clueIdx ? "1px solid #ddd" : "1px solid #eee",
                    opacity: i <= clueIdx ? 1 : 0.35,
                  }}>
                    <div style={{ fontSize:9, fontWeight:700, letterSpacing:1, textTransform:"uppercase", color: i === 0 ? "#6A0DAD" : i === 1 ? "#999" : "#bbb", marginBottom:4 }}>
                      Clue {i+1} {i === 0 ? "(vague)" : i === 1 ? "(medium)" : "(obvious)"}
                    </div>
                    <div style={{ fontSize:13.5, fontWeight:500, color: i <= clueIdx ? "#1a1a1a" : "#ccc", lineHeight:1.45 }}>
                      {i <= clueIdx ? c : "—"}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ display:"flex", gap:8, marginTop:4 }}>
                {clueIdx < 2 && !showAnswer && (
                  <button onClick={(e) => { e.stopPropagation(); setClueIdx(clueIdx+1); }} style={{ background:"#6A0DAD", color:"#fff", border:"none", borderRadius:6, padding:"8px 16px", fontSize:11, fontWeight:600, cursor:"pointer" }}>Next clue</button>
                )}
                {!showAnswer && (
                  <button onClick={(e) => { e.stopPropagation(); setShowAnswer(true); }} style={{ background:"#333", color:"#fff", border:"none", borderRadius:6, padding:"8px 16px", fontSize:11, fontWeight:600, cursor:"pointer" }}>Show answer</button>
                )}
              </div>
              {showAnswer && (
                <div style={{ background:"#6A0DAD11", border:"1px solid #6A0DAD33", borderRadius:8, padding:"10px 14px", textAlign:"center", width:"100%" }}>
                  <div style={{ fontSize:9, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:"#6A0DAD", marginBottom:4 }}>Answer</div>
                  <div style={{ fontSize:20, fontWeight:700, color:"#1a1a1a" }}>{card.a}</div>
                </div>
              )}
            </>
          ) : isOrder ? (
            <>
              <div style={{ fontSize:12, fontWeight:600, color:"#8B4513", letterSpacing:1, textTransform:"uppercase" }}>{card.q}</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8, width:"100%" }}>
                {card.items.map((item,i) => (
                  <div key={i} style={{ background:"#f9f6f2", border:"1px solid #e0d6c8", borderRadius:8, padding:"12px 16px", textAlign:"center", fontSize:16, fontWeight:600, color:"#1a1a1a" }}>{item}</div>
                ))}
              </div>
            </>
          ) : isHtH ? (
            <>
              <p style={{ fontSize:16, fontWeight:600, color:"#1a1a1a", textAlign:"center", lineHeight:1.45, margin:"0 0 12px" }}>{card.q}</p>
              <div style={{ display:"flex", flexDirection:"column", gap:8, width:"100%" }}>
                {card.options.map((opt,i) => (
                  <div key={i} onClick={(e) => { e.stopPropagation(); setShowAnswer(true); }} style={{
                    background: showAnswer && i === card.correctIdx ? "#2E8B5722" : "#fafafa",
                    border: showAnswer && i === card.correctIdx ? "2px solid #2E8B57" : "1px solid #eee",
                    borderRadius:8, padding:"12px 16px", cursor:"pointer",
                    display:"flex", gap:10, alignItems:"center",
                  }}>
                    <span style={{ fontSize:12, fontWeight:700, color:"#999", minWidth:18 }}>{String.fromCharCode(65+i)}</span>
                    <span style={{ fontSize:14, fontWeight:500, color:"#1a1a1a" }}>{opt}</span>
                    {showAnswer && i === card.correctIdx && <span style={{ marginLeft:"auto", fontSize:11, color:"#2E8B57", fontWeight:700 }}>✓</span>}
                  </div>
                ))}
              </div>
            </>
          ) : (
            <p style={{ fontSize:17, fontWeight:600, color:"#1a1a1a", textAlign:"center", lineHeight:1.5, margin:0 }}>{card.q}</p>
          )}
        </div>

        {!isWho && !isHtH && (
          <div style={{ borderTop:"1px solid #eee", background:"#f8f8f8" }}>
            {card.type === "Three-for-Three" && (
              <div style={{ padding:"8px 14px 0", textAlign:"center" }}>
                <span style={{ fontSize:9.5, color:"#999", lineHeight:1.4, fontStyle:"italic" }}>Team must give answers one at a time; card holder confirms "Right" or "Wrong" one at a time. Three total chances then move on.</span>
              </div>
            )}
            <div style={{ padding:"8px 14px 10px", textAlign:"center" }}>
              <div style={{ transform:"rotate(180deg)" }}>
                <span style={{ fontSize:11, fontFamily:"Georgia, serif", fontStyle:"italic", color:"#d0d0d0", lineHeight:1.3 }}>
                  {card.a}
                </span>
              </div>
            </div>
          </div>
        )}
      </div>

      {!isWho && !isHtH && (
        <button onClick={() => setRotated(!rotated)} style={{
          display:"block", margin:"12px auto 0", background:"transparent", color:"#444",
          border:"1px solid #282828", borderRadius:20, padding:"8px 24px", fontSize:11,
          fontWeight:600, cursor:"pointer", letterSpacing:0.5
        }}>
          {rotated ? "↻ Rotate back" : "↻ Rotate to read answer"}
        </button>
      )}
    </div>
  );
}

function CardViewer({ onNext, onBack }) {
  const [idx, setIdx] = useState(0);
  const [filter, setFilter] = useState("All");
  const [seenTypes, setSeenTypes] = useState(new Set());
  const filtered = filter === "All" ? CARDS : CARDS.filter(c => c.type === filter);
  const card = filtered[idx] || filtered[0];

  useEffect(() => { setIdx(0); }, [filter]);

  const isFirstOfType = !seenTypes.has(card.type);
  useEffect(() => {
    if (!seenTypes.has(card.type)) {
      setSeenTypes(prev => new Set([...prev, card.type]));
    }
  }, [card.type]);

  const goNext = () => { if (idx < filtered.length - 1) setIdx(idx+1); };
  const goPrev = () => { if (idx > 0) setIdx(idx-1); };

  const coreCount = CARDS.filter(c => CORE_TYPES.includes(c.type)).length;
  const futureCount = CARDS.filter(c => !CORE_TYPES.includes(c.type)).length;

  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", padding:"1.5rem 1rem", background:"#111", color:"#f0ebe3" }}>
      <div style={{ maxWidth:440, width:"100%" }}>
        <div style={{ fontSize:11, letterSpacing:4, textTransform:"uppercase", color:"#C00000", marginBottom:6, fontWeight:600 }}>Sample cards</div>
        <div style={{ fontSize:12, color:"#666", marginBottom:14 }}>{coreCount} core + {futureCount} future season previews</div>

        <div style={{ background:"#1a1a1a", border:"1px solid #7F600055", borderRadius:8, padding:"10px 14px", marginBottom:14 }}>
          <p style={{ fontSize:12, color:"#ccc", margin:0, lineHeight:1.5 }}>
            <span style={{ fontWeight:700, color:"#f0ebe3" }}>Key concepts:</span> A <strong>Content Category</strong> is a theme — the cultural world the question lives in (e.g. Tsa Mmino = Music, eRenkini = Taxi rank, Ko Skolong = School). A <strong>Card Type</strong> is how you engage with that content — the game mechanic (e.g. Straight Shot = one question one answer, Qhuba = complete the line, Sbonise = perform).
          </p>
        </div>

        <div style={{ background:"#1a1a1a", border:"1px solid #37562355", borderRadius:8, padding:"10px 14px", marginBottom:16 }}>
          <p style={{ fontSize:12, color:"#ccc", margin:0, fontWeight:600 }}>Here are the card types. You can browse them all (tap All), or tap a specific card type to filter.</p>
        </div>

        <div style={{ marginBottom:6 }}>
          <div style={{ display:"flex", gap:5, marginBottom:6, flexWrap:"wrap" }}>
            {["All", "Three-for-Three", "Qhuba", "Sbonise", "Straight Shot"].map(t => (
              <button key={t} onClick={() => setFilter(t)} style={{
                background: filter===t ? (TYPE_COLORS[t] || "#333") : "transparent",
                color: filter===t ? "#fff" : "#888",
                border: filter===t ? "none" : "1px solid #333",
                borderRadius:16, padding:"5px 11px", fontSize:10.5, cursor:"pointer", fontWeight:filter===t ? 600 : 400,
              }}>{t}</button>
            ))}
          </div>
          <div style={{ fontSize:9, letterSpacing:1.5, textTransform:"uppercase", color:"#555", fontWeight:600, marginBottom:6, marginTop:4 }}>New card types</div>
          <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
            {FUTURE_TYPES_NAMES.map(t => (
              <button key={t} onClick={() => setFilter(t)} style={{
                background: filter===t ? (TYPE_COLORS[t] || "#333") : "transparent",
                color: filter===t ? "#fff" : "#666",
                border: filter===t ? "none" : "1px solid #282828",
                borderRadius:16, padding:"5px 11px", fontSize:10.5, cursor:"pointer", fontWeight:filter===t ? 600 : 400,
                fontStyle:"italic",
              }}>{t}</button>
            ))}
          </div>
        </div>

        <div style={{ marginTop:16 }}>
          <CardComponent card={card} showExplainer={isFirstOfType} />
        </div>

        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:16, marginBottom:28 }}>
          <button onClick={goPrev} disabled={idx===0} style={{ background:"transparent", color:idx===0?"#282828":"#C09050", border:"1px solid #282828", borderRadius:8, padding:"10px 20px", fontSize:12, cursor:idx===0?"default":"pointer" }}>← Prev</button>
          <span style={{ fontSize:12, color:"#555" }}>{idx+1} / {filtered.length}</span>
          <button onClick={goNext} disabled={idx>=filtered.length-1} style={{ background:"transparent", color:idx>=filtered.length-1?"#282828":"#C09050", border:"1px solid #282828", borderRadius:8, padding:"10px 20px", fontSize:12, cursor:idx>=filtered.length-1?"default":"pointer" }}>Next →</button>
        </div>

        <div style={{ display:"flex", gap:10 }}>
          <button onClick={onBack} style={{ flex:1, background:"transparent", color:"#666", border:"1px solid #282828", borderRadius:8, padding:"12px", fontSize:13, cursor:"pointer" }}>Back</button>
          <button onClick={onNext} style={{ flex:2, background:"#375623", color:"#fff", border:"none", borderRadius:8, padding:"12px", fontSize:13, fontWeight:600, cursor:"pointer" }}>What's next for LLL →</button>
        </div>
      </div>
    </div>
  );
}

function FeedbackScreen({ onBack }) {
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", padding:"2rem 1.5rem", background:"#111", color:"#f0ebe3" }}>
      <div style={{ maxWidth:440 }}>
        <div style={{ fontSize:11, letterSpacing:4, textTransform:"uppercase", color:"#C00000", marginBottom:16, fontWeight:600 }}>Over to you</div>
        <h2 style={{ fontSize:22, fontWeight:700, marginBottom:6, fontFamily:"Georgia, serif" }}>Jeff, three questions</h2>
        <p style={{ fontSize:13, color:"#888", marginBottom:28, lineHeight:1.6 }}>Everything here is a prototype — built to be reshaped by your creative direction.</p>

        <div style={{ display:"flex", flexDirection:"column", gap:14, marginBottom:28 }}>
          <div style={{ background:"#1a1a1a", borderRadius:12, padding:"18px", border:"1px solid #282828" }}>
            <div style={{ fontSize:10, fontWeight:600, letterSpacing:2, textTransform:"uppercase", color:"#C00000", marginBottom:8 }}>Question 1</div>
            <p style={{ fontSize:14, fontWeight:600, margin:"0 0 6px", lineHeight:1.4 }}>Do these card types feel like LLL?</p>
            <p style={{ fontSize:12, color:"#888", margin:0, lineHeight:1.5 }}>4 core types + 5 future types. Does the mix capture the energy of the live show and the board game?</p>
          </div>
          <div style={{ background:"#1a1a1a", borderRadius:12, padding:"18px", border:"1px solid #282828" }}>
            <div style={{ fontSize:10, fontWeight:600, letterSpacing:2, textTransform:"uppercase", color:"#375623", marginBottom:8 }}>Question 2</div>
            <p style={{ fontSize:14, fontWeight:600, margin:"0 0 6px", lineHeight:1.4 }}>Can we put together a writing session with writers to build the game from scratch?</p>
            <p style={{ fontSize:12, color:"#888", margin:0, lineHeight:1.5 }}>The card types and content blocks must come from a collective voice. Happy for anything here to be scrapped.</p>
          </div>
          <div style={{ background:"#1a1a1a", borderRadius:12, padding:"18px", border:"1px solid #282828" }}>
            <div style={{ fontSize:10, fontWeight:600, letterSpacing:2, textTransform:"uppercase", color:"#7F6000", marginBottom:8 }}>Question 3</div>
            <p style={{ fontSize:14, fontWeight:600, margin:"0 0 6px", lineHeight:1.4 }}>Where should LLL expand?</p>
            <p style={{ fontSize:12, color:"#888", margin:0, lineHeight:1.5 }}>New card types in seasonal drops. Regional editions (Durban, Cape Town). Cultural editions (Every Hood Every Ghetto). A South Africa national edition. What calls to you?</p>
          </div>
        </div>

        <CardFormatDemo />

        <div style={{ background:"#1a1a1a", borderRadius:10, padding:"14px 16px", marginBottom:28, border:"1px solid #282828" }}>
          <p style={{ fontSize:12, color:"#888", margin:0, lineHeight:1.6 }}><span style={{ fontWeight:600, color:"#ddd" }}>Reminder:</span> This is a design prototype. Card design, content, scoring, and format are all built to be iterated on with your input.</p>
        </div>

        <button onClick={onBack} style={{ width:"100%", background:"transparent", color:"#666", border:"1px solid #282828", borderRadius:8, padding:"12px", fontSize:13, cursor:"pointer" }}>← Back to cards</button>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState(0);
  return (
    <div style={{ fontFamily:"'Helvetica Neue', Helvetica, Arial, sans-serif", margin:0, padding:0 }}>
      {screen===0 && <IntroScreen onNext={() => setScreen(1)} />}
      {screen===1 && <TurnScreen onNext={() => setScreen(2)} onBack={() => setScreen(0)} />}
      {screen===2 && <BoardScreen onNext={() => setScreen(3)} onBack={() => setScreen(1)} />}
      {screen===3 && <CardViewer onNext={() => setScreen(4)} onBack={() => setScreen(2)} />}
      {screen===4 && <FutureScreen onNext={() => setScreen(5)} onBack={() => setScreen(3)} />}
      {screen===5 && <FeedbackScreen onBack={() => setScreen(3)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
